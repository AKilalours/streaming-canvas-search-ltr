dataset:
  id: movielens          # demo dataset
  split: test            # use the processed split you want (test/val/train)
  paths:
    corpus: data/processed/movielens/test/corpus.jsonl
  artifacts:
    bm25: artifacts/bm25/movielens_bm25.pkl
    dense_dir_glob: artifacts/faiss/movielens*
    ltr: artifacts/ltr/movielens_ltr.pkl

retrieval:
  alpha: 0.5
  candidate_k: 1000      # WINNING PARAM
  rerank_k: 200          # WINNING PARAM

personalization:
  enabled: true
  boost_weight: 0.15

