<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Netflix Demo — Multilingual + Voice</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Netflix Demo</h1>
        <p class="sub">Multilingual search + voice input + speak output</p>
      </div>

      <div class="controls">
        <select id="lang">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="hi">Hindi</option>
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="ar">Arabic</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese</option>
        </select>

        <button id="mic" class="btn" title="Voice input">🎙️</button>
        <button id="speak" class="btn" title="Read answer aloud">🔊</button>
      </div>
    </header>

    <main class="card">
      <textarea id="q" rows="3" placeholder="Ask for recommendations… (any language)"></textarea>

      <div class="row">
        <button id="go" class="btn primary">Ask</button>
        <span id="status" class="status"></span>
      </div>

      <section id="out" class="out"></section>
      <section id="sources" class="sources"></section>
    </main>

    <footer class="foot">
      <span class="muted">
        Note: SpeechRecognition is limited/partial in Safari. Use Chrome if mic doesn’t work.
      </span>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
