train:
  dataset_processed_dir: data/processed/nfcorpus
  corpus_split: train
  query_split: train
  qrels_split: train

  bm25_artifact: artifacts/bm25/nfcorpus_bm25.pkl
  emb_dir: artifacts/faiss/nfcorpus_sentence-transformers_paraphrase-multilingual-MiniLM-L12-v2
  embed_model: sentence-transformers/all-MiniLM-L6-v2

  # Candidate generation
  bm25_candidate_k: 200
  dense_candidate_k: 200
  alpha: 0.5
  train_feature_k: 50   # number of candidates per query used for training rows

  # Labels
  min_relevance: 1

  # Train/val split
  val_frac: 0.15
  random_seed: 42

artifacts:
  ltr_dir: artifacts/ltr
  model_name: nfcorpus_ltr.pkl
  meta_name: nfcorpus_ltr_meta.json

lightgbm:
  objective: lambdarank
  metric: ndcg
  eval_at: [10]
  learning_rate: 0.05
  n_estimators: 400
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.9
  colsample_bytree: 0.9
  random_state: 42

