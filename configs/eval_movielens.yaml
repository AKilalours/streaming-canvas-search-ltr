eval:
  dataset_processed_dir: data/processed/movielens
  split: test
  k: 10
  diagnostics:
    recall_k: 100
    oracle_k: 10

reporting:
  out_dir: reports

methods:
  - name: bm25
    type: bm25
    bm25_artifact: artifacts/bm25/movielens_bm25.pkl
    k: 2000

  - name: dense
    type: dense
    model_name: artifacts/faiss/movielens_ft_e5
    emb_dir: artifacts/faiss/movielens_ft_e5
    candidate_k: 200

  - name: hybrid
    type: hybrid
    alpha: 0.2
    bm25_candidate_k: 2000
    dense_candidate_k: 200
    model_name: artifacts/faiss/movielens_ft_e5
    emb_dir: artifacts/faiss/movielens_ft_e5

  - name: hybrid_ltr
    type: hybrid_ltr
    alpha: 0.2
    bm25_candidate_k: 2000
    dense_candidate_k: 200
    rerank_k: 200
    model_name: artifacts/faiss/movielens_ft_e5
    emb_dir: artifacts/faiss/movielens_ft_e5
    ltr_model_path: artifacts/ltr/movielens_ltr_tuned.pkl
    corpus_split_for_features: train
