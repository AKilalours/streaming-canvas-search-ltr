eval:
  dataset_processed_dir: data/processed/scifact
  split: test
  k: 10

methods:
  - name: bm25
    type: bm25
    bm25_artifact: artifacts/bm25/scifact_bm25.pkl

  - name: faiss
    type: faiss
    model_name: sentence-transformers/all-MiniLM-L6-v2
    faiss_dir: artifacts/faiss/scifact_sentence-transformers_all-MiniLM-L6-v2
    candidate_k: 50

  - name: hybrid
    type: hybrid
    alpha: 0.5
    bm25_artifact: artifacts/bm25/scifact_bm25.pkl
    model_name: sentence-transformers/all-MiniLM-L6-v2
    faiss_dir: artifacts/faiss/scifact_sentence-transformers_all-MiniLM-L6-v2
    bm25_candidate_k: 50
    faiss_candidate_k: 50

reporting:
  out_dir: reports

retriever:
  type: bm25
  bm25_artifact: artifacts/bm25/scifact_bm25.pkl
