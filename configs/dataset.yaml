dataset:
  name: nfcorpus
  provider: beir
  raw_dir: data/raw/beir
  processed_dir: data/processed/nfcorpus

embeddings:
  model_name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 64
  normalize: true


fields:
  doc_id: doc_id
  title: title
  text: text
  query_id: query_id
  query_text: text

build:
  # Which split to export as processed.
  # BEIR provides standard splits; we will export all (train/dev/test) into processed_dir.
  export_splits: ["train", "test"]

