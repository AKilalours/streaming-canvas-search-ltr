apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlens-api
  namespace: streamlens
  labels:
    app: streamlens-api
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streamlens-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: streamlens-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: api
        image: streamlens-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: streamlens-secrets
              key: openai-api-key
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: streamlens-api
  namespace: streamlens
spec:
  selector:
    app: streamlens-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
