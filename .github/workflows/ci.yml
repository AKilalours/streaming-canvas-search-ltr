name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install deps
        run: |
          uv sync 

      - name: Lint
        run: |
          PYTHONPATH=src uv run ruff check src tests

      - name: Tests
        run: |
          PYTHONPATH=src uv run pytest

